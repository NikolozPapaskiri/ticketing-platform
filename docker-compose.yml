services:
  api:
    build: .
    container_name: ticketing-api
    ports:
      - "5000:8080"
    environment:
      # Development here means: auto-migrate + seed the dev admin, so `docker compose up`
      # boots a working product. Real production migrates in a pipeline step instead.
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=ticketing;Username=ticketing;Password=ticketing
      ConnectionStrings__Redis: redis:6379
      RabbitMq__HostName: rabbitmq
      Jwt__SigningKey: DEV-ONLY-signing-key-ticketing-platform-local-0123456789
      PaymentProvider__BaseUrl: http://localhost:8080/dev-payment/
      # Shared object storage (MinIO) instead of a local volume, so ticket PDFs survive the
      # API/worker split and multiple replicas. Same IFileStorage port, S3 provider.
      FileStorage__Provider: S3
      FileStorage__S3__ServiceUrl: http://minio:9000
      FileStorage__S3__BucketName: ticketing-files
      FileStorage__S3__AccessKey: minioadmin
      FileStorage__S3__SecretKey: minioadmin
      # Demo marketplace data (tenant + staff + published categorized events) so a fresh
      # `docker compose up` demos instantly. Integration tests never set this flag.
      Seed__DemoData: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  web:
    build:
      context: ./apps/web
    container_name: ticketing-web
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://api:8080
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5000
      COOKIE_SECURE: "false"
    depends_on:
      api:
        condition: service_started

  postgres:
    image: postgres:17
    container_name: ticketing-postgres
    environment:
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
      POSTGRES_DB: ticketing
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ticketing"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: ticketing-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ticketing-rabbitmq
    environment:
      # Explicit user: RabbitMQ restricts the built-in 'guest' account to loopback, and a
      # Docker port-proxied connection does not qualify. Same creds in appsettings.json.
      RABBITMQ_DEFAULT_USER: ticketing
      RABBITMQ_DEFAULT_PASS: ticketing
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI (ticketing/ticketing)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ticketing-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"     # S3 API (the app talks here)
      - "9001:9001"     # web console (minioadmin/minioadmin)
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
