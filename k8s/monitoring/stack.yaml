# The observability stack for the in-cluster ticketing namespace: the same OTel Collector ->
# Prometheus/Loki/Tempo -> Grafana pipeline (+ Alertmanager and the postgres/redis exporters) that
# docker-compose.observability.yml runs locally. Config files are shared with compose via the
# kustomization's configMapGenerator, so there is one source of truth. Deployed as an add-on:
#   kubectl apply -k k8s/monitoring
apiVersion: apps/v1
kind: Deployment
metadata: { name: otel-collector }
spec:
  replicas: 1
  selector: { matchLabels: { app: otel-collector } }
  template:
    metadata: { labels: { app: otel-collector } }
    spec:
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:latest
          args: ["--config=/etc/otel/otel-collector.yaml"]
          ports: [{ containerPort: 4317 }, { containerPort: 4318 }, { containerPort: 8889 }]
          volumeMounts: [{ name: config, mountPath: /etc/otel }]
      volumes:
        - name: config
          configMap: { name: otel-collector-config }
---
apiVersion: v1
kind: Service
metadata: { name: otel-collector }
spec:
  selector: { app: otel-collector }
  ports:
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
    - { name: otlp-http, port: 4318, targetPort: 4318 }
    - { name: prom, port: 8889, targetPort: 8889 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: prometheus }
spec:
  replicas: 1
  selector: { matchLabels: { app: prometheus } }
  template:
    metadata: { labels: { app: prometheus } }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args: ["--config.file=/etc/prometheus/prometheus.yml"]
          ports: [{ containerPort: 9090 }]
          volumeMounts: [{ name: config, mountPath: /etc/prometheus }]
      volumes:
        - name: config
          configMap: { name: prometheus-config }
---
apiVersion: v1
kind: Service
metadata: { name: prometheus }
spec:
  selector: { app: prometheus }
  ports: [{ port: 9090, targetPort: 9090 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: alertmanager }
spec:
  replicas: 1
  selector: { matchLabels: { app: alertmanager } }
  template:
    metadata: { labels: { app: alertmanager } }
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          args: ["--config.file=/etc/alertmanager/alertmanager.yml"]
          ports: [{ containerPort: 9093 }]
          volumeMounts: [{ name: config, mountPath: /etc/alertmanager }]
      volumes:
        - name: config
          configMap: { name: alertmanager-config }
---
apiVersion: v1
kind: Service
metadata: { name: alertmanager }
spec:
  selector: { app: alertmanager }
  ports: [{ port: 9093, targetPort: 9093 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: tempo }
spec:
  replicas: 1
  selector: { matchLabels: { app: tempo } }
  template:
    metadata: { labels: { app: tempo } }
    spec:
      containers:
        - name: tempo
          image: grafana/tempo:latest
          args: ["-config.file=/etc/tempo/tempo.yaml"]
          ports: [{ containerPort: 3200 }, { containerPort: 4317 }]
          volumeMounts: [{ name: config, mountPath: /etc/tempo }]
      volumes:
        - name: config
          configMap: { name: tempo-config }
---
apiVersion: v1
kind: Service
metadata: { name: tempo }
spec:
  selector: { app: tempo }
  ports:
    - { name: http, port: 3200, targetPort: 3200 }
    - { name: otlp-grpc, port: 4317, targetPort: 4317 }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: loki }
spec:
  replicas: 1
  selector: { matchLabels: { app: loki } }
  template:
    metadata: { labels: { app: loki } }
    spec:
      containers:
        - name: loki
          image: grafana/loki:latest
          args: ["-config.file=/etc/loki/loki-config.yaml"]
          ports: [{ containerPort: 3100 }]
          volumeMounts: [{ name: config, mountPath: /etc/loki }]
      volumes:
        - name: config
          configMap: { name: loki-config }
---
apiVersion: v1
kind: Service
metadata: { name: loki }
spec:
  selector: { app: loki }
  ports: [{ port: 3100, targetPort: 3100 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: grafana }
spec:
  replicas: 1
  selector: { matchLabels: { app: grafana } }
  template:
    metadata: { labels: { app: grafana } }
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: admin }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: admin }
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: Viewer }
          ports: [{ containerPort: 3000 }]
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboard-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
      volumes:
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dashboard-provider
          configMap: { name: grafana-dashboard-provider }
        - name: dashboards
          configMap: { name: grafana-dashboards }
---
apiVersion: v1
kind: Service
metadata: { name: grafana }
spec:
  selector: { app: grafana }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: postgres-exporter }
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres-exporter } }
  template:
    metadata: { labels: { app: postgres-exporter } }
    spec:
      containers:
        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:latest
          env:
            - { name: DATA_SOURCE_NAME, value: "postgresql://ticketing:ticketing@postgres:5432/ticketing?sslmode=disable" }
          ports: [{ containerPort: 9187 }]
---
apiVersion: v1
kind: Service
metadata: { name: postgres-exporter }
spec:
  selector: { app: postgres-exporter }
  ports: [{ port: 9187, targetPort: 9187 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: redis-exporter }
spec:
  replicas: 1
  selector: { matchLabels: { app: redis-exporter } }
  template:
    metadata: { labels: { app: redis-exporter } }
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          env:
            - { name: REDIS_ADDR, value: "redis://redis:6379" }
          ports: [{ containerPort: 9121 }]
---
apiVersion: v1
kind: Service
metadata: { name: redis-exporter }
spec:
  selector: { app: redis-exporter }
  ports: [{ port: 9121, targetPort: 9121 }]
