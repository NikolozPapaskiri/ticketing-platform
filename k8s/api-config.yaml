# Non-secret configuration for the API pods. Connection strings point at the in-cluster
# Services by DNS name (postgres/redis/rabbitmq).
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  # Development in this LOCAL cluster: auto-migrate + seed the dev admin on startup.
  # A real environment runs migrations as a pipeline/job step and sets Production here.
  ASPNETCORE_ENVIRONMENT: "Development"
  ConnectionStrings__Default: "Host=postgres;Port=5432;Database=ticketing;Username=ticketing;Password=ticketing"
  ConnectionStrings__Redis: "redis:6379"
  RabbitMq__HostName: "rabbitmq"
  PaymentProvider__BaseUrl: "http://localhost:8080/dev-payment/"
  # Two API replicas => share one DataProtection key ring in Redis, so protected payloads validate
  # across pods and survive restarts (a per-pod filesystem ring would not).
  DataProtection__Provider: "Redis"
  # Shared object storage over the S3 API (the in-cluster MinIO Service). Both the API and worker
  # Deployments use this, so ticket PDFs are readable across replicas.
  FileStorage__Provider: "S3"
  FileStorage__S3__ServiceUrl: "http://minio:9000"
  FileStorage__S3__BucketName: "ticketing-files"
---
# Secrets go in a Secret, not the ConfigMap - even though in this LOCAL manifest the value is
# the committed dev key, the shape is right: production replaces this object from a vault
# (external-secrets, sealed-secrets, CSI driver), never from git.
apiVersion: v1
kind: Secret
metadata:
  name: api-secrets
type: Opaque
stringData:
  Jwt__SigningKey: "DEV-ONLY-signing-key-ticketing-platform-local-0123456789"
  # MinIO root credentials, shared by the MinIO Deployment and the app's S3 client.
  FileStorage__S3__AccessKey: "minioadmin"
  FileStorage__S3__SecretKey: "minioadmin"
