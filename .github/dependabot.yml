# Dependency update automation. Dependabot opens PRs for outdated/vulnerable dependencies across
# every ecosystem this repo uses; CI (build/test, audits, image scan) then gates each PR.
version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: "/apps/web"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/apps/web"
    schedule:
      interval: weekly
